# SonarQube configuration for the Angular 18 frontend
# Run from the /frontend directory:
#   sonar-scanner -Dsonar.token=<YOUR_TOKEN>

sonar.projectKey=rev-password-manager-frontend
sonar.projectName=Rev Password Manager - Frontend
sonar.projectVersion=1.0.0

# Source roots
sonar.sources=src
sonar.exclusions=**/node_modules/**,**/*.spec.ts,**/environments/**,**/*.module.ts

# Tests
sonar.tests=src
sonar.test.inclusions=**/*.spec.ts

# TypeScript
sonar.typescript.tsconfigPath=tsconfig.json

# Coverage — generated by: ng test --no-watch --code-coverage
sonar.javascript.lcov.reportPaths=coverage/frontend/lcov.info

# SonarQube server
sonar.host.url=http://localhost:9000
sonar.sourceEncoding=UTF-8
