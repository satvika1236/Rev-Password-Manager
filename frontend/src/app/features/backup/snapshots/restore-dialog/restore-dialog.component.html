<h2 mat-dialog-title class="dialog-title">
  <span class="warning-icon">
    <lucide-icon name="alert-triangle" [size]="28"></lucide-icon>
  </span>
  Restore Snapshot?
</h2>

<mat-dialog-content class="dialog-content">
  <p class="dialog-message">
    You are about to restore your vault to the state from <strong>{{ data.snapshotDate }}</strong>.
  </p>

  <div class="warning-box">
    <h3 class="warning-title">
      <lucide-icon name="shield-alert" [size]="18"></lucide-icon>
      Warning
    </h3>
    <ul class="warning-list">
      <li>Your current vault entries will be replaced</li>
      <li>This action cannot be undone</li>
      <li>Consider exporting your current vault first</li>
    </ul>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end" class="dialog-actions">
  <button mat-button (click)="onCancel()" class="cancel-btn">
    Cancel
  </button>
  <button mat-raised-button color="warn" (click)="onConfirm()" class="confirm-btn">
    <lucide-icon name="rotate-ccw" [size]="16"></lucide-icon>
    Restore Anyway
  </button>
</mat-dialog-actions>
