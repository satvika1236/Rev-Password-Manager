<div class="settings-layout">
  <aside class="settings-sidebar">
    <h1 class="settings-title">Settings</h1>
    <nav class="settings-nav">
      <a routerLink="account" routerLinkActive="active" class="nav-pill">
        <lucide-icon name="user" [size]="18"></lucide-icon>
        Account
      </a>
      <a routerLink="security" routerLinkActive="active" class="nav-pill">
        <lucide-icon name="shield" [size]="18"></lucide-icon>
        Security
      </a>
      <a routerLink="preferences" routerLinkActive="active" class="nav-pill">
        <lucide-icon name="sliders" [size]="18"></lucide-icon>
        Preferences
      </a>
      <a routerLink="sessions" routerLinkActive="active" class="nav-pill">
        <lucide-icon name="monitor" [size]="18"></lucide-icon>
        Sessions
      </a>
    </nav>

    <h2 class="settings-section-title">Security Audit</h2>
    <nav class="settings-nav">
      <a routerLink="audit-logs" routerLinkActive="active" class="nav-pill">
        <lucide-icon name="activity" [size]="18"></lucide-icon>
        Audit Logs
      </a>
      <a routerLink="security-alerts" routerLinkActive="active" class="nav-pill">
        <lucide-icon name="bell" [size]="18"></lucide-icon>
        Security Alerts
      </a>
    </nav>
  </aside>

  <main class="settings-content">
    <router-outlet></router-outlet>
  </main>
</div>
