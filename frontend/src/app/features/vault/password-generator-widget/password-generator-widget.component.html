<div class="generator-container">
  <div class="generator-header">
    <h4>Password Generator</h4>
  </div>

  <form [formGroup]="optionsForm" class="generator-options">
    <div class="slider-group">
      <div class="slider-header"
        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
        <label for="lengthSlider"
          style="margin: 0 !important; color: var(--text-main) !important; font-weight: 600 !important;">Length</label>
        <span class="length-badge"
          style="background: #8b5cf6; color: #FFFFFF; padding: 4px 12px; border-radius: 9999px; font-weight: 700; font-size: 0.85rem; box-shadow: 0 2px 8px rgba(139, 92, 246, 0.4); min-width: 32px; text-align: center; display: inline-block;">{{
          optionsForm.get('length')?.value }}</span>
      </div>
      <input type="range" id="lengthSlider" formControlName="length" min="8" max="64" class="slider" />
    </div>

    <div class="toggles-grid">
      <label class="toggle-option">
        <input type="checkbox" formControlName="includeUppercase" />
        A-Z (Uppercase)
      </label>
      <label class="toggle-option">
        <input type="checkbox" formControlName="includeLowercase" />
        a-z (Lowercase)
      </label>
      <label class="toggle-option">
        <input type="checkbox" formControlName="includeNumbers" />
        0-9 (Numbers)
      </label>
      <label class="toggle-option">
        <input type="checkbox" formControlName="includeSpecial" />
        !&#64;# (Symbols)
      </label>
    </div>

    <div class="toggles-grid advanced-toggles">
      <label class="toggle-option">
        <input type="checkbox" formControlName="excludeSimilar" />
        Exclude Similar (i, l, 1, L, o, 0, O)
      </label>
      <label class="toggle-option">
        <input type="checkbox" formControlName="excludeAmbiguous" />
        Exclude Ambiguous ({{ '{' }} {{ '}' }} [ ] ( ) / \ ' " ` ~ , ; : . <>)
      </label>
    </div>
  </form>

  <button type="button" class="btn btn-primary generate-btn" (click)="generatePassword()">Generate Password</button>
</div>
