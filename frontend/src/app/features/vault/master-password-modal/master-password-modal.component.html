<div class="modal-backdrop">
  <div class="modal-content">
    <div class="modal-header">
      <div class="header-title" style="display: flex; align-items: center; gap: 8px;">
        <span class="lock-icon"><lucide-icon name="lock" [size]="20"></lucide-icon></span>
        <h3 style="margin: 0;">Unlock Entry</h3>
      </div>
      <button class="close-btn" (click)="onCancel()"
        style="display: flex; align-items: center; justify-content: center; background: transparent; border: none; cursor: pointer; color: var(--text-muted);"><lucide-icon
          name="x" [size]="20"></lucide-icon></button>
    </div>

    <form (ngSubmit)="onSubmit()">
      <div class="modal-body">
        <p class="description">
          Please enter your Master Password to decrypt and view this sensitive entry.
        </p>

        @if (errorMessage) {
        <div class="alert alert-danger">
          {{ errorMessage }}
        </div>
        }

        <div class="form-group">
          <label for="masterPassword">Master Password</label>
          <input type="password" id="masterPassword" class="form-control" [(ngModel)]="masterPassword"
            name="masterPassword" placeholder="Enter your master password" required autocomplete="current-password"
            autofocus>
        </div>

        @if (showOtpField) {
        <div class="form-group" style="margin-top: 15px;">
          <label for="otpToken">Authenticator Code (2FA)</label>
          <input type="text" id="otpToken" class="form-control" [(ngModel)]="otpToken" name="otpToken"
            placeholder="Enter 6-digit code" autocomplete="one-time-code">
        </div>
        }
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="onCancel()" [disabled]="isSubmitting">Cancel</button>
        <button type="submit" class="btn btn-primary" [disabled]="!masterPassword.trim() || isSubmitting">
          {{ isSubmitting ? 'Decrypting...' : 'Unlock' }}
        </button>
      </div>
    </form>
  </div>
</div>
