<div class="notification-bell-wrapper">
  <!-- Bell Button -->
  <button class="bell-btn" (click)="toggleDropdown($event)"
    [attr.aria-label]="'Notifications' + (hasUnread() ? ' (' + unreadCount() + ' unread)' : '')"
    [class.active]="dropdownOpen()">
    <svg class="bell-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
      stroke-linejoin="round">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
      <path d="M13.73 21a2 2 0 0 1-3.46 0" />
    </svg>
    @if (hasUnread()) {
    <span class="badge">{{ unreadCount() > 99 ? '99+' : unreadCount() }}</span>
    }
  </button>

  <!-- Dropdown — rendered via position:fixed to escape sidebar clipping -->
  @if (dropdownOpen()) {
  <div class="notification-dropdown-fixed" [style.top.px]="dropdownTop()" [style.left.px]="dropdownLeft()">
    <div class="dropdown-header">
      <span class="dropdown-title">Notifications</span>
      @if (hasUnread()) {
      <button class="mark-all-btn" (click)="markAllAsRead($event)">Mark all read</button>
      }
    </div>

    <div class="dropdown-body">
      @if (loading()) {
      <div class="state-msg">
        <span class="spinner"></span>
        Loading…
      </div>
      } @else if (notifications().length === 0) {
      <div class="state-msg empty">
        <span class="empty-icon">🔔</span>
        <span>No notifications yet</span>
      </div>
      } @else {
      @for (n of notifications(); track n.id) {
      <div class="notification-item" [class.unread]="!n.read" (click)="markAsRead(n, $event)">
        <div class="notif-dot" [class.visible]="!n.read"></div>
        <div class="notif-content">
          <p class="notif-title">{{ n.title }}</p>
          <p class="notif-message">{{ n.message }}</p>
          <span class="notif-time">{{ formatTime(n.createdAt) }}</span>
        </div>
        <button class="delete-btn" (click)="deleteNotification(n, $event)" aria-label="Delete notification">✕</button>
      </div>
      }
      }
    </div>
  </div>
  }

</div>
