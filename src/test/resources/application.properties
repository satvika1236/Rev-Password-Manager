spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
logging.level.org.hibernate.SQL=DEBUG
# Disable JWT validation for integration tests if needed or provide a secret
jwt.secret=450d0b0db2bcfcadd57512760233475d4a65476a6d65476a6d65476a6d65476a
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=86400000
spring.jpa.defer-datasource-initialization=true
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.main.allow-bean-definition-overriding=true
# Feature 40 – Secure File Storage Vault (use temp dir for tests)
secure.files.storage-path=./target/test-secure-files
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB
