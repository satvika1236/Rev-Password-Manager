
spring.application.name=Rev-PasswordManager
spring.profiles.default=local
spring.config.import=optional:file:.env[.properties]
server.port=${SERVER_PORT:8080}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.sql.init.mode=${SPRING_SQL_INIT_MODE:always}

jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:900000}
jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

encryption.algorithm=AES/GCM/NoPadding
encryption.key-size=256
pbkdf2.iterations=100000

logging.level.root=${LOGGING_LEVEL_ROOT:INFO}
logging.level.com.revature=${LOGGING_LEVEL_COM_REVATURE:INFO}

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.group.liveness.include=livenessState,ping
management.endpoint.health.group.readiness.include=readinessState,db,diskSpace,ping

# Logging Configuration
logging.file.name=${LOGGING_FILE_NAME:logs/password-manager.log}
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7

# Email Configuration
spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:1025}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:8080,http://localhost}
ai.openai.api-key=${AI_OPENAI_API_KEY:}

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB
secure.files.storage-path=${SECURE_FILES_STORAGE_PATH:./secure-files}
