# Docker-specific Spring Boot Configuration

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/rev_password_manager?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQL_USER:appuser}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQL_PASSWORD:}}

spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}

logging.level.com.revature=${LOGGING_LEVEL_COM_REVATURE:INFO}
logging.file.name=${LOGGING_FILE_NAME:/app/logs/password-manager.log}
management.endpoint.health.show-details=when-authorized

secure.files.storage-path=${SECURE_FILES_STORAGE_PATH:/app/secure-files}
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost,http://frontend}
