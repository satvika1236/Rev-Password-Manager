spring.config.import=aws-secretsmanager:/password-manager-phase1/database,aws-secretsmanager:/password-manager-phase1/application

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.sql.init.mode=never
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:2}
spring.datasource.hikari.connection-timeout=${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:30000}

logging.level.root=${LOGGING_LEVEL_ROOT:WARN}
logging.level.com.revature=${LOGGING_LEVEL_COM_REVATURE:INFO}
logging.file.name=${LOGGING_FILE_NAME:/app/logs/password-manager.log}

management.endpoint.health.show-details=never

server.ssl.enabled=${SERVER_SSL_ENABLED:false}
server.forward-headers-strategy=framework
springdoc.swagger-ui.enabled=false
